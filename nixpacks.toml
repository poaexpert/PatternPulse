[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm install --include=dev",
  "python3 -m venv /opt/pyenv",
  "/opt/pyenv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "npm run build --workspace=frontend",
  "npm run build --workspace=backend"
]

[start]
cmd = "bash start.sh"
